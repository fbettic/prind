services:
  # Desactivar Traefik interno de prind
  traefik:
    profiles:
      - disabled

  # Klipper con volúmenes persistentes en PRIND_DATA_DIR
  klipper:
    volumes:
      - /dev:/dev
      - ${PRIND_DATA_DIR}/config:/opt/printer_data/config
      - run:/opt/printer_data/run
      - ${PRIND_DATA_DIR}/gcodes:/opt/printer_data/gcodes
      - log:/opt/printer_data/logs

  # Init apunta a PRIND_DATA_DIR (chown sobre la carpeta persistente)
  init:
    volumes:
      - ${PRIND_DATA_DIR}:/prind

  # Mainsail SOLO por host
  mainsail:
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      # Router principal (HTTPS)
      - "traefik.http.routers.mainsail.rule=Host(`${PRINTER_HOST}`)"
      - "traefik.http.routers.mainsail.entrypoints=websecure"
      - "traefik.http.routers.mainsail.tls=true"
      - "traefik.http.routers.mainsail.tls.certresolver=cloudflare"
      - "traefik.http.routers.mainsail-http.rule=Host(`${PRINTER_HOST}`)"
      - "traefik.http.routers.mainsail-http.entrypoints=web"
      - "traefik.http.routers.mainsail-http.middlewares=redirect-to-https@docker"
      - "traefik.http.services.mainsail.loadbalancer.server.port=80"

  # Moonraker SOLO bajo el MISMO host de Mainsail
  moonraker:
    networks:
      - traefik-net
    volumes:
      - /dev/null:/opt/klipper/config/null
      - /dev/null:/opt/klipper/docs/null
      - /run/dbus:/run/dbus
      - /run/systemd:/run/systemd
      - run:/opt/printer_data/run
      - ${PRIND_DATA_DIR}/gcodes:/opt/printer_data/gcodes
      - log:/opt/printer_data/logs
      - ${PRIND_DATA_DIR}/database:/opt/printer_data/database
      - ${PRIND_DATA_DIR}/config:/opt/printer_data/config
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.moonraker.rule=Host(`${PRINTER_HOST}`) && PathRegexp(`^/(websocket|printer|api|access|machine|server)`)"
      - "traefik.http.routers.moonraker.entrypoints=websecure"
      - "traefik.http.routers.moonraker.tls=true"
      - "traefik.http.routers.moonraker.tls.certresolver=cloudflare"
      - "traefik.http.routers.moonraker.priority=100"
      - "traefik.http.routers.moonraker-http.rule=Host(`${PRINTER_HOST}`) && PathRegexp(`^/(websocket|printer|api|access|machine|server)`)"
      - "traefik.http.routers.moonraker-http.entrypoints=web"
      - "traefik.http.routers.moonraker-http.middlewares=redirect-to-https@docker"
      - "traefik.http.services.moonraker.loadbalancer.server.port=7125"

networks:
  traefik-net:
    external: true
