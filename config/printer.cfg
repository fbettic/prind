# This file contains common pin mappings for the Geeetech GT2560 v3
# board. GT2560 v3 board uses a firmware compiled for the AVR
# atmega2560. This config is for A10 with TMC2209 in UART, 
# mini12864 display, BLTouch, chamber temperature and input shaping.

[include mainsail.cfg]

# See docs/Config_Reference.md for a description of parameters.
[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0

[virtual_sdcard]
path: /opt/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 1500
max_z_velocity: 20
max_z_accel: 500

[stepper_x]
step_pin: PC0
dir_pin: PG2
enable_pin: !PC2
microsteps: 16
rotation_distance: 39.85
endstop_pin: ^!PA2
position_endstop: 0
position_max: 225
homing_speed: 40

[tmc2209 stepper_x]
uart_pin: PJ0
uart_address: 3
interpolate: True
run_current: 0.55
hold_current: 0.5
sense_resistor: 0.100
stealthchop_threshold: 9999

# E2
[stepper_y]
step_pin: PL6     # E2_STP
dir_pin: PL4      # E2_DIR
enable_pin: !PG0  # E2_EN
microsteps: 16
rotation_distance: 39.85
endstop_pin: ^!PA6
position_endstop: 0
position_max: 240
homing_speed: 40

[tmc2209 stepper_y]
uart_pin: PJ0
uart_address: 0
interpolate: True
run_current: 0.55
hold_current: 0.5
sense_resistor: 0.100
stealthchop_threshold: 9999

[stepper_z]
step_pin: PA3
dir_pin: !PA1
enable_pin: !PA5
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 230
position_min: -10
homing_speed: 20

[tmc2209 stepper_z]
uart_pin: PJ0
uart_address: 2
interpolate: True
run_current: 0.55
hold_current: 0.5
sense_resistor: 0.100
stealthchop_threshold: 9999

# E1
[stepper_z1]
step_pin: PL0
dir_pin: !PL2
enable_pin: !PL1
microsteps: 16
rotation_distance: 8


[tmc2209 stepper_z1]
uart_pin: PJ0
uart_address: 1
interpolate: True
run_current: 0.55
hold_current: 0.5
sense_resistor: 0.100
stealthchop_threshold: 9999



[extruder]
step_pin: PL3
dir_pin: PL5
enable_pin: !PB6
microsteps: 16
rotation_distance: 7.748
nozzle_diameter: 0.4
filament_diameter: 1.750
heater_pin: PB4
sensor_type: ATC Semitec 104GT-2
sensor_pin: PK3
min_temp: 0
max_temp: 250
min_extrude_temp: 160
max_extrude_only_distance: 150.0
#control: pid
#pid_Kp: 12.9
#pid_Ki: 0.55
#pid_Kd: 75.55
pressure_advance: 0.05
pressure_advance_smooth_time: 0.040


[heater_bed]
heater_pin: PG5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK2
min_temp: 0
max_temp: 120
#control: pid
#pid_Kp: 182.46
#pid_Ki: 35.92
#pid_Kd: 231.70

[bltouch]
sensor_pin: ^PC7
control_pin: PB5
x_offset: -40
y_offset: 0
#z_offset: 3.2
speed: 5.0
samples: 2
sample_retract_dist: 8.0

[bed_mesh]
speed: 120
horizontal_move_z: 5
# El sensor puede medir desde X=10 hasta X=185
# (Si la boquilla va a 225, el sensor llega a 185)
mesh_min: 10, 20      
mesh_max: 185, 235    
probe_count: 5, 5
algorithm: bicubic
fade_start: 1
fade_end: 10

[safe_z_home]
home_xy_position: 152, 130
speed: 50
z_hop: 10
z_hop_speed: 5

[z_tilt]
z_positions:
    -30, 130      # Motor Izquierdo (30mm a la izquierda del 0)
    257.5, 130    # Motor Derecho (225 + 32.5mm)

points:
    # Puntos de sondeo (Coordenada de la BOQUILLA + Offset = Donde toca el sensor)
    # Deben estar alineados en Y=130 (centro de la cama)
    60, 130       # Punto Izquierda (Boquilla en 60 -> Sensor en 20)
    220, 130      # Punto Derecha (Boquilla en 220 -> Sensor en 180)

speed: 120
horizontal_move_z: 10
retries: 10
retry_tolerance: 0.02

[fan]
pin: PH6
cycle_time: 0.150
kick_start_time: 0.300

[filament_switch_sensor sensor_e0]
switch_pin: !PK4


[screws_tilt_adjust]
# Tornillo 1: Delantero Izquierdo (Punto de referencia base)
# El tornillo está aprox en X=35. Boquilla = 35 - (-40 offset) = 75
screw1: 75, 35
screw1_name: front left screw

# Tornillo 2: Delantero Derecho
# El tornillo está en X=195. Boquilla ideal sería 235, pero tu tope es 225.
# Usamos 225, el sensor quedará en 185 (cerca del tornillo).
screw2: 225, 35
screw2_name: front right screw

# Tornillo 3: Trasero Derecho
screw3: 225, 205
screw3_name: rear right screw

# Tornillo 4: Trasero Izquierdo
screw4: 75, 205
screw4_name: rear left screw

speed: 100
horizontal_move_z: 10
screw_thread: CW-M3



[output_pin beeper]
pin: PD0



